plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'io.legato.capacitor'
    compileSdk 34

    defaultConfig {
        minSdk 24
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

// NATIVE_ARTIFACTS:BEGIN
ext.legatoNativeArtifactContract = [
    repositoryUrl: 'https://repo1.maven.org/maven2',
    coordinate: 'dev.dgutierrez:legato-android-core:0.1.0'
]
// Adapter Android dependency must stay artifact-only.
// Do not replace with project(':native:android:core').
// NATIVE_ARTIFACTS:END

repositories {
    maven {
        url = uri(legatoNativeArtifactContract.repositoryUrl)
    }
    mavenCentral()
}

dependencies {
    // Artifact-only contract: consume Android core through Maven coordinates.
    implementation legatoNativeArtifactContract.coordinate
    // Capacitor sync includes :capacitor-android as a local Gradle project in the host app.
    implementation project(':capacitor-android')
    // Explicitly pinned for now to keep coroutine behavior stable in this monorepo.
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.1'
    implementation 'androidx.media3:media3-exoplayer:1.4.1'

    testImplementation 'junit:junit:4.13.2'
}
