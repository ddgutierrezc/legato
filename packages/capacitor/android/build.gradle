ext {
    junitVersion = project.hasProperty('junitVersion') ? rootProject.ext.junitVersion : '4.13.2'
}

buildscript {
    ext.kotlinVersion = rootProject.ext.has('kotlinVersion')
        ? rootProject.ext.kotlinVersion
        : (rootProject.ext.has('kotlin_version') ? rootProject.ext.kotlin_version : '1.9.25')

    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}"
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'io.legato.capacitor'
    compileSdk = project.hasProperty('compileSdkVersion') ? rootProject.ext.compileSdkVersion : 34

    defaultConfig {
        minSdk = project.hasProperty('minSdkVersion') ? rootProject.ext.minSdkVersion : 24
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

// NATIVE_ARTIFACTS:BEGIN
ext.legatoNativeArtifactContract = [
    repositoryUrl: 'https://repo1.maven.org/maven2',
    coordinate: 'dev.dgutierrez:legato-android-core:0.1.2'
]
// Adapter Android dependency must stay artifact-only.
// Do not replace with project(':native:android:core').
// NATIVE_ARTIFACTS:END

repositories {
    google()
    maven {
        url = uri(legatoNativeArtifactContract.repositoryUrl)
    }
    mavenCentral()
}

dependencies {
    // Artifact-only contract: consume Android core through Maven coordinates.
    implementation legatoNativeArtifactContract.coordinate
    // Capacitor sync includes :capacitor-android as a local Gradle project in the host app.
    implementation project(':capacitor-android')
    // Explicitly pinned for now to keep coroutine behavior stable in this monorepo.
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.1'
    implementation 'androidx.media3:media3-exoplayer:1.4.1'

    testImplementation "junit:junit:$junitVersion"
}
