plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.ddgutierrezc.legato'
version = '0.1.0'

android {
  namespace 'expo.modules.legato'
  defaultConfig {
    versionCode 1
    versionName '0.1.0'
  }
}

dependencies {
  implementation project(':expo-modules-core')
  implementation 'io.github.ddgutierrezc:legato-core:0.1.0'
}
