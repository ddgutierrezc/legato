<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legato Capacitor Demo</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      main {
        max-width: 980px;
        margin: 1.25rem auto 2rem;
        padding: 0 0.75rem;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      h1,
      h2 {
        margin: 0 0 0.5rem;
      }

      p {
        margin: 0;
      }

      .stack {
        display: grid;
        gap: 0.75rem;
      }

      .card {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 0.85rem;
        background: color-mix(in srgb, canvas 96%, #94a3b8 4%);
      }

      .actions,
      .action-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .action-grid button {
        min-width: 132px;
      }

      .two-col {
        display: grid;
        gap: 0.75rem;
      }

      @media (min-width: 860px) {
        .two-col {
          grid-template-columns: 1fr 1fr;
        }
      }

      .inline-fields {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }

      .inline-fields label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.9rem;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 0.5rem 0.6rem;
        box-sizing: border-box;
      }

      textarea {
        width: 100%;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 0.84rem;
        line-height: 1.35;
      }

      button {
        border: 1px solid #64748b;
        border-radius: 8px;
        background: #0f172a;
        color: #f8fafc;
        padding: 0.45rem 0.8rem;
        cursor: pointer;
      }

      button[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
      }

      #snapshot-summary {
        margin: 0;
        padding: 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        min-height: 84px;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 0.83rem;
      }

      #events {
        min-height: 140px;
      }

      #snapshot-json {
        min-height: 170px;
      }

      #log {
        min-height: 220px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Legato Capacitor Demo</h1>
      <p>Native playback smoke harness for iOS/Capacitor debugging.</p>

      <div class="stack" style="margin-top: 0.8rem">
        <section class="card stack">
          <h2>Smoke actions</h2>
          <div class="actions">
            <button id="run-smoke" class="native-action" type="button">Run smoke flow</button>
            <button id="run-end-smoke" class="native-action" type="button">Run let-it-end smoke</button>
            <button id="copy-log" type="button">Copy raw log</button>
          </div>
          <div id="env-status">Detecting platform…</div>
        </section>

        <section class="card stack">
          <h2>Raw operation log</h2>
          <textarea id="log" readonly spellcheck="false" placeholder="Action logs, payloads, and errors..."></textarea>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
