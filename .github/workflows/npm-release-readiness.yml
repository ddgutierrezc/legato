name: NPM Release Readiness

on:
  pull_request:
    paths:
      - 'packages/contract/**'
      - 'packages/capacitor/**'
      - 'README.md'
      - 'apps/capacitor-demo/scripts/**'
      - 'apps/capacitor-demo/package.json'
      - 'apps/capacitor-demo/package-lock.json'
      - 'docs/maintainers/**'
      - 'docs/releases/npm-tech-preview-checklist.md'
      - '.github/workflows/npm-release-readiness.yml'
  workflow_dispatch:

jobs:
  npm-readiness:
    name: npm-readiness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/capacitor-demo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/capacitor-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate npm readiness lane
        run: npm run validate:npm:readiness

      - name: Validate workflow/docs contracts
        run: npm run test:npm:readiness

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-release-readiness-artifacts
          path: |
            apps/capacitor-demo/artifacts/npm-release-readiness-v1/**
            apps/capacitor-demo/artifacts/external-consumer-validation-v1/**
