name: Cross-platform release control (v2)

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Shared release id for all selected lanes
        required: true
        type: string
      targets:
        description: Comma-separated targets (android,ios,npm)
        required: true
        default: android,ios,npm
        type: string
      target_modes:
        description: Comma-separated target modes (android=publish,ios=publish,npm=protected-publish)
        required: true
        default: android=preflight-only,ios=publish,npm=readiness
        type: string
      ios_distribution_repo:
        description: iOS distribution repository URL
        required: false
        type: string
      ios_distribution_ref:
        description: iOS distribution branch/ref
        required: false
        default: main
        type: string
      npm_publish_intent_evidence:
        description: Optional protected-publish approval proof URL
        required: false
        type: string
      npm_package_target:
        description: npm package target for npm lane
        required: false
        type: choice
        default: capacitor
        options:
          - capacitor
          - contract

permissions:
  contents: write
  packages: read
  id-token: write

concurrency:
  group: release-control-${{ inputs.release_id }}
  cancel-in-progress: false

jobs:
  validate-dispatch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/capacitor-demo
    outputs:
      targets_json: ${{ steps.normalize.outputs.targets_json }}
      android_selected: ${{ steps.normalize.outputs.android_selected }}
      ios_selected: ${{ steps.normalize.outputs.ios_selected }}
      npm_selected: ${{ steps.normalize.outputs.npm_selected }}
      android_mode: ${{ steps.normalize.outputs.android_mode }}
      ios_mode: ${{ steps.normalize.outputs.ios_mode }}
      npm_mode: ${{ steps.normalize.outputs.npm_mode }}
      ios_release_tag: ${{ steps.extract-ios-contract.outputs.ios_release_tag }}
      ios_release_version: ${{ steps.extract-ios-contract.outputs.ios_release_version }}
      release_packet_path: ${{ steps.release-packet.outputs.release_packet_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/capacitor-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate release control contract
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./artifacts
          set +e
          node ./scripts/release-control-contract.mjs --release-id "${{ inputs.release_id }}" --targets "${{ inputs.targets }}" --target-modes "${{ inputs.target_modes }}" > ./artifacts/release-control-contract.json
          code=$?
          set -e
          cat ./artifacts/release-control-contract.json
          exit "$code"

      - name: Normalize selected targets and modes
        id: normalize
        shell: bash
        run: |
          set -euo pipefail
          is_ok=$(node -e 'const fs=require("node:fs");const c=JSON.parse(fs.readFileSync("./artifacts/release-control-contract.json","utf8"));process.stdout.write(String(c.ok));')
          if [[ "$is_ok" != "true" ]]; then
            node -e 'const fs=require("node:fs");const c=JSON.parse(fs.readFileSync("./artifacts/release-control-contract.json","utf8"));for (const err of c.errors ?? []) console.error(err);for (const diag of c.diagnostics ?? []) console.error(`[${diag.code ?? "UNKNOWN"}] ${diag.message ?? ""}`);process.exit(1);'
          fi
          targets_json=$(node -e 'const fs=require("node:fs");const c=JSON.parse(fs.readFileSync("./artifacts/release-control-contract.json","utf8"));process.stdout.write(JSON.stringify(c.value.targets));')
          android_mode=$(node -e 'const fs=require("node:fs");const c=JSON.parse(fs.readFileSync("./artifacts/release-control-contract.json","utf8"));process.stdout.write(c.value.target_modes.android ?? "");')
          ios_mode=$(node -e 'const fs=require("node:fs");const c=JSON.parse(fs.readFileSync("./artifacts/release-control-contract.json","utf8"));process.stdout.write(c.value.target_modes.ios ?? "");')
          npm_mode=$(node -e 'const fs=require("node:fs");const c=JSON.parse(fs.readFileSync("./artifacts/release-control-contract.json","utf8"));process.stdout.write(c.value.target_modes.npm ?? "");')
          echo "targets_json=$targets_json" >> "$GITHUB_OUTPUT"
          [[ "$targets_json" == *"android"* ]] && echo "android_selected=true" >> "$GITHUB_OUTPUT" || echo "android_selected=false" >> "$GITHUB_OUTPUT"
          [[ "$targets_json" == *"ios"* ]] && echo "ios_selected=true" >> "$GITHUB_OUTPUT" || echo "ios_selected=false" >> "$GITHUB_OUTPUT"
          [[ "$targets_json" == *"npm"* ]] && echo "npm_selected=true" >> "$GITHUB_OUTPUT" || echo "npm_selected=false" >> "$GITHUB_OUTPUT"
          echo "android_mode=$android_mode" >> "$GITHUB_OUTPUT"
          echo "ios_mode=$ios_mode" >> "$GITHUB_OUTPUT"
          echo "npm_mode=$npm_mode" >> "$GITHUB_OUTPUT"

      - name: Extract iOS contract release values
        id: extract-ios-contract
        shell: bash
        run: |
          set -euo pipefail
          contract_path="../../packages/capacitor/native-artifacts.json"
          if [[ ! -f "$contract_path" ]]; then
            echo "Missing iOS contract file: $contract_path" >&2
            exit 1
          fi
          ios_version=$(node -e 'const fs=require("node:fs");const c=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));const v=String(c?.ios?.version ?? "").trim();if(!v){process.exit(1)};process.stdout.write(v);' "$contract_path") || {
            echo "Unable to derive ios.version from native-artifacts contract" >&2
            exit 1
          }
          ios_tag="v${ios_version#v}"
          if [[ -z "$ios_version" || -z "$ios_tag" ]]; then
            echo "Derived empty iOS release values from contract" >&2
            exit 1
          fi
          echo "ios_release_version=$ios_version" >> "$GITHUB_OUTPUT"
          echo "ios_release_tag=$ios_tag" >> "$GITHUB_OUTPUT"

      - name: Materialize release execution packet
        id: release-packet
        shell: bash
        run: |
          set -euo pipefail
          packet_dir="./artifacts/release-control/${{ inputs.release_id }}"
          packet_path="$packet_dir/release-execution-packet.json"
          mkdir -p "$packet_dir"
          node -e 'const fs=require("node:fs");const path=require("node:path");const c=JSON.parse(fs.readFileSync("./artifacts/release-control-contract.json","utf8"));const packet={...(c.value?.packet ?? {}),phase:"preflight",repo_root:path.resolve(process.cwd(),"../..")};if(!packet.schema_version){throw new Error("missing release packet in contract output")}fs.writeFileSync(process.argv[1], `${JSON.stringify(packet,null,2)}\n`,"utf8");' "$packet_path"
          echo "release_packet_path=$packet_path" >> "$GITHUB_OUTPUT"

      - name: Upload release execution packet
        uses: actions/upload-artifact@v7
        with:
          name: release-packet-${{ inputs.release_id }}
          path: apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/release-execution-packet.json

  preflight-completeness:
    needs: validate-dispatch
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.preflight.outputs.ok }}
    defaults:
      run:
        working-directory: apps/capacitor-demo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/capacitor-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download release execution packet
        uses: actions/download-artifact@v8
        with:
          name: release-packet-${{ inputs.release_id }}
          path: apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}

      - name: Run release packet preflight completeness gate
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "./artifacts/release-control/${{ inputs.release_id }}"
          changelog_anchor="CHANGELOG.md#r-${{ inputs.release_id }}"
          set +e
          node ./scripts/release-preflight-completeness.mjs \
            --repo-root ../.. \
            --release-packet "${{ needs.validate-dispatch.outputs.release_packet_path }}" \
            --output "./artifacts/release-control/${{ inputs.release_id }}/preflight.json"
          code=$?
          set -e
          preflight_ok=$(node -e 'const fs=require("node:fs");const v=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));process.stdout.write(String(Boolean(v.ok)));' "./artifacts/release-control/${{ inputs.release_id }}/preflight.json")
          echo "ok=$preflight_ok" >> "$GITHUB_OUTPUT"
          cat "./artifacts/release-control/${{ inputs.release_id }}/preflight.json"
          exit "$code"

      - name: Upload release preflight artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-preflight-${{ inputs.release_id }}
          path: apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/preflight.json

  android-lane:
    if: ${{ needs.validate-dispatch.outputs.android_selected == 'true' && needs.preflight-completeness.outputs.ok == 'true' }}
    needs: [validate-dispatch, preflight-completeness]
    uses: ./.github/workflows/release-android.yml
    with:
      target: android
      mode: ${{ needs.validate-dispatch.outputs.android_mode }}
      release_id: ${{ inputs.release_id }}
    secrets: inherit

  ios-lane:
    if: ${{ needs.validate-dispatch.outputs.ios_selected == 'true' && needs.preflight-completeness.outputs.ok == 'true' }}
    needs: [validate-dispatch, preflight-completeness]
    runs-on: ubuntu-latest
    environment: release
    outputs:
      summary_json: ${{ steps.emit.outputs.summary_json }}
    defaults:
      run:
        working-directory: apps/capacitor-demo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/capacitor-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download release execution packet
        uses: actions/download-artifact@v8
        with:
          name: release-packet-${{ inputs.release_id }}
          path: apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}

      - name: Mint iOS distribution repo token
        id: ios-app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.IOS_RELEASE_APP_ID }}
          private-key: ${{ secrets.IOS_RELEASE_APP_PRIVATE_KEY }}
          owner: ddgutierrezc
          repositories: legato-ios-core

      - name: Run iOS preflight
        run: IOS_RELEASE_ID=${{ inputs.release_id }} IOS_RELEASE_TAG=${{ needs.validate-dispatch.outputs.ios_release_tag }} npm run release:ios:preflight -- --release-id "${{ inputs.release_id }}" --mode "${{ needs.validate-dispatch.outputs.ios_mode }}"

      - name: Run iOS publish lane
        shell: bash
        run: |
          set +e
          IOS_RELEASE_ID=${{ inputs.release_id }} IOS_RELEASE_TAG=${{ needs.validate-dispatch.outputs.ios_release_tag }} IOS_DISTRIBUTION_REPO="${{ inputs.ios_distribution_repo }}" IOS_DISTRIBUTION_REF="${{ inputs.ios_distribution_ref }}" IOS_GITHUB_APP_TOKEN="${{ steps.ios-app-token.outputs.token }}" npm run release:ios:publish
          code=$?
          set -e
          exit "$code"

      - name: Emit iOS summary output
        id: emit
        shell: bash
        run: |
          set -euo pipefail
          {
            echo 'summary_json<<EOF'
            cat "./artifacts/ios-publication-v2/${{ inputs.release_id }}/ios-summary.json"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload iOS publish evidence
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-${{ inputs.release_id }}-ios
          path: apps/capacitor-demo/artifacts/ios-publication-v2/${{ inputs.release_id }}/*

  npm-lane:
    if: ${{ needs.validate-dispatch.outputs.npm_selected == 'true' && needs.preflight-completeness.outputs.ok == 'true' }}
    needs: [validate-dispatch, preflight-completeness]
    uses: ./.github/workflows/release-npm.yml
    with:
      release_id: ${{ inputs.release_id }}
      mode: ${{ needs.validate-dispatch.outputs.npm_mode }}
      publish_intent_evidence: ${{ inputs.npm_publish_intent_evidence }}
      package_target: ${{ inputs.npm_package_target }}
    secrets: inherit

  aggregate-release-summary:
    if: ${{ always() }}
    needs: [validate-dispatch, preflight-completeness, android-lane, ios-lane, npm-lane]
    runs-on: ubuntu-latest
    outputs:
      release_notes_markdown: ${{ steps.release-communications.outputs.release_notes_markdown }}
      release_tag: ${{ steps.release-communications.outputs.release_tag }}
      release_title: ${{ steps.release-communications.outputs.release_title }}
      release_packet_schema: ${{ steps.release-communications.outputs.release_packet_schema }}
      reconciliation_ok: ${{ steps.release-communications.outputs.reconciliation_ok }}
      fresh_head_closeout_ok: ${{ steps.release-communications.outputs.fresh_head_closeout_ok }}
    defaults:
      run:
        working-directory: apps/capacitor-demo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/capacitor-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build aggregated summary
        env:
          SELECTED_TARGETS_JSON: ${{ needs.validate-dispatch.outputs.targets_json }}
          ANDROID_MODE: ${{ needs.validate-dispatch.outputs.android_mode }}
          IOS_MODE: ${{ needs.validate-dispatch.outputs.ios_mode }}
          NPM_MODE: ${{ needs.validate-dispatch.outputs.npm_mode }}
          ANDROID_SUMMARY_RAW: ${{ needs.android-lane.outputs.summary_json || '' }}
          IOS_SUMMARY_RAW: ${{ needs.ios-lane.outputs.summary_json || '' }}
          NPM_SUMMARY_RAW: ${{ needs.npm-lane.outputs.summary_json || '' }}
          RELEASE_ID: ${{ inputs.release_id }}
          SOURCE_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          import { writeFile, mkdir } from 'node:fs/promises';
          import { resolve } from 'node:path';
          import { adaptAndroidReleaseSummary } from './scripts/release-control-android-adapter.mjs';
          import { aggregateReleaseSummary, parseSummaryJsonPayload } from './scripts/aggregate-release-summary.mjs';
          import { createNotSelectedSummary, normalizeTargetSummary } from './scripts/release-control-summary-schema.mjs';

          const parseTargets = (raw) => {
            const value = String(raw ?? '').trim();
            if (!value) return [];
            return JSON.parse(value);
          };

          const selectedTargets = parseTargets(process.env.SELECTED_TARGETS_JSON);
          const requestedModes = {
            android: process.env.ANDROID_MODE ?? '',
            ios: process.env.IOS_MODE ?? '',
            npm: process.env.NPM_MODE ?? '',
          };

          const androidRaw = String(process.env.ANDROID_SUMMARY_RAW ?? '').trim();
          const iosRaw = String(process.env.IOS_SUMMARY_RAW ?? '').trim();
          const npmRaw = String(process.env.NPM_SUMMARY_RAW ?? '').trim();

          const androidSummary = selectedTargets.includes('android') && androidRaw
            ? adaptAndroidReleaseSummary({ selected: true, releaseSummary: parseSummaryJsonPayload('android', androidRaw), evidenceRoot: 'android' })
            : createNotSelectedSummary('android');

          const iosSummary = selectedTargets.includes('ios') && iosRaw
            ? normalizeTargetSummary(parseSummaryJsonPayload('ios', iosRaw))
            : createNotSelectedSummary('ios');

          const npmLane = parseSummaryJsonPayload('npm', npmRaw);
          const npmSummary = selectedTargets.includes('npm') && npmLane
            ? normalizeTargetSummary({
              target: 'npm',
              selected: true,
              terminal_status: npmLane.terminal_status,
              stage_statuses: { mode: npmLane.mode, readiness: npmLane.status },
              evidence: [{ label: 'summary', path: `npm/${process.env.RELEASE_ID}/summary.json` }],
              missing_evidence: [],
              notes: npmLane.failures ?? [],
            })
            : createNotSelectedSummary('npm');

          const summary = aggregateReleaseSummary({
            release_id: process.env.RELEASE_ID,
            source_commit: process.env.SOURCE_COMMIT,
            selected_targets: selectedTargets,
            requested_modes: requestedModes,
            target_summaries: {
              android: androidSummary,
              ios: iosSummary,
              npm: npmSummary,
            },
          });

          const root = resolve('./artifacts/release-control', process.env.RELEASE_ID || 'missing-release-id');
          await mkdir(root, { recursive: true });
          await writeFile(resolve(root, 'android-summary.json'), `${JSON.stringify(androidSummary, null, 2)}\n`, 'utf8');
          await writeFile(resolve(root, 'ios-summary.json'), `${JSON.stringify(iosSummary, null, 2)}\n`, 'utf8');
          await writeFile(resolve(root, 'npm-summary.json'), `${JSON.stringify(npmSummary, null, 2)}\n`, 'utf8');
          await writeFile(resolve(root, 'summary.json'), `${JSON.stringify(summary, null, 2)}\n`, 'utf8');
          const markdown = [
            '# Cross-platform release summary (v2)',
            '',
            `- release_id: \`${summary.release_id}\``,
            `- source_commit: \`${summary.source_commit || 'unknown'}\``,
            `- overall_status: \`${summary.overall_status}\``,
            '',
            '## Targets',
            ...Object.values(summary.targets).map((entry) => `- ${entry.target}: ${entry.terminal_status}`),
          ].join('\n');
          await writeFile(resolve(root, 'summary.md'), `${markdown}\n`, 'utf8');
          NODE

      - name: Upload aggregated summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-control-summary-${{ inputs.release_id }}
          path: |
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/android-summary.json
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/ios-summary.json
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/npm-summary.json
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/summary.json
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/summary.md

      - name: Generate and validate release communications
        id: release-communications
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          IOS_SELECTED: ${{ needs.validate-dispatch.outputs.ios_selected }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "./artifacts/release-control/${RELEASE_ID}"
          narrative_file="../../docs/releases/notes/${RELEASE_ID}.json"
          derivative_notes_file="../../docs/releases/notes/${RELEASE_ID}-ios-derivative.md"
          if [[ ! -f "$narrative_file" ]]; then
            echo "MISSING_NARRATIVE_OR_DERIVATIVE_NOTES: Missing required narrative file: $narrative_file" >&2
            echo "Copy docs/releases/notes/release-narrative.template.json and fill required fields." >&2
            exit 1
          fi
          if [[ "$IOS_SELECTED" == "true" && ! -f "$derivative_notes_file" ]]; then
            echo "MISSING_NARRATIVE_OR_DERIVATIVE_NOTES: Missing required derivative iOS notes file: $derivative_notes_file" >&2
            echo "Use docs/releases/templates/ios-derivative-release-template.md to author the derivative backlink payload." >&2
            exit 1
          fi

          node ./scripts/release-changelog-facts.mjs \
            --release-id "$RELEASE_ID" \
            --release-packet "${{ needs.validate-dispatch.outputs.release_packet_path }}" \
            --summary "./artifacts/release-control/${RELEASE_ID}/summary.json" \
            --output "./artifacts/release-control/${RELEASE_ID}/release-facts.json" >/dev/null

          node ./scripts/generate-github-release-notes.mjs \
            --facts "./artifacts/release-control/${RELEASE_ID}/release-facts.json" \
            --narrative "$narrative_file" \
            --changelog-anchor "CHANGELOG.md#r-${RELEASE_ID,,}" \
            --out-json "./artifacts/release-control/${RELEASE_ID}/github-release.json" \
            --out-markdown "./artifacts/release-control/${RELEASE_ID}/github-release.md" >/dev/null

          validate_cmd=(
            node ./scripts/validate-release-reconciliation.mjs
            --facts "./artifacts/release-control/${RELEASE_ID}/release-facts.json"
            --release-notes "./artifacts/release-control/${RELEASE_ID}/github-release.md"
            --changelog "../../CHANGELOG.md"
          )
          if [[ "$IOS_SELECTED" == "true" ]]; then
            validate_cmd+=(--derivative-notes "$derivative_notes_file")
          fi
          "${validate_cmd[@]}" > "./artifacts/release-control/${RELEASE_ID}/reconciliation-report.json"

          node ./scripts/persist-release-evidence-index.mjs \
            --repo-root ../.. \
            --release-id "$RELEASE_ID" \
            --source-commit "${{ github.sha }}" \
            --durable "$(node -e 'const fs=require("node:fs");const f=JSON.parse(fs.readFileSync("./artifacts/release-control/'"${RELEASE_ID}"'/release-facts.json","utf8"));process.stdout.write(JSON.stringify(f.evidence?.durable ?? []));')" \
            --ephemeral "$(node -e 'const fs=require("node:fs");const f=JSON.parse(fs.readFileSync("./artifacts/release-control/'"${RELEASE_ID}"'/release-facts.json","utf8"));process.stdout.write(JSON.stringify(f.evidence?.ephemeral ?? []));')" >/dev/null

          node ./scripts/release-closure-bundle.mjs \
            --release-id "$RELEASE_ID" \
            --source-commit "${{ github.sha }}" \
            --run-url "$RUN_URL" \
            --summary "./artifacts/release-control/${RELEASE_ID}/summary.json" \
            --facts "./artifacts/release-control/${RELEASE_ID}/release-facts.json" \
            --reconciliation "./artifacts/release-control/${RELEASE_ID}/reconciliation-report.json" \
            --release-packet "${{ needs.validate-dispatch.outputs.release_packet_path }}" \
            --evidence-index-ref "docs/releases/evidence-index/${RELEASE_ID}.json" \
            --expected-head "${{ github.sha }}" \
            --output-dir "./artifacts/release-control/${RELEASE_ID}" >/dev/null

          node ./scripts/validate-release-closeout.mjs \
            --closure-bundle "./artifacts/release-control/${RELEASE_ID}/closure-bundle.json" \
            --release-packet "${{ needs.validate-dispatch.outputs.release_packet_path }}" \
            --expected-head "${{ github.sha }}" \
            --output "./artifacts/release-control/${RELEASE_ID}/fresh-head-closeout.json" >/dev/null

          reconciliation_ok=$(node -e 'const fs=require("node:fs");const r=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));process.stdout.write(String(Boolean(r.ok)));' "./artifacts/release-control/${RELEASE_ID}/reconciliation-report.json")
          closeout_ok=$(node -e 'const fs=require("node:fs");const r=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));process.stdout.write(String(r.status==="PASS"));' "./artifacts/release-control/${RELEASE_ID}/fresh-head-closeout.json")
          packet_schema=$(node -e 'const fs=require("node:fs");const p=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));process.stdout.write(String(p.schema_version ?? ""));' "${{ needs.validate-dispatch.outputs.release_packet_path }}")
          echo "release_packet_schema=$packet_schema" >> "$GITHUB_OUTPUT"
          echo "reconciliation_ok=$reconciliation_ok" >> "$GITHUB_OUTPUT"
          echo "fresh_head_closeout_ok=$closeout_ok" >> "$GITHUB_OUTPUT"

          {
            echo 'release_notes_markdown<<EOF'
            cat "./artifacts/release-control/${RELEASE_ID}/github-release.md"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "release_tag=release/${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "release_title=Release ${RELEASE_ID}" >> "$GITHUB_OUTPUT"

      - name: Upload release notes reconciliation artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-notes-${{ inputs.release_id }}
          path: |
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/release-execution-packet.json
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/release-facts.json
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/github-release.json
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/github-release.md
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/reconciliation-report.json

      - name: Upload release closure bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-closure-bundle-${{ inputs.release_id }}
          path: |
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/closure-bundle.json
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/closure-bundle.md
            apps/capacitor-demo/artifacts/release-control/${{ inputs.release_id }}/fresh-head-closeout.json

      - name: Upload derivative iOS release note input
        if: ${{ needs.validate-dispatch.outputs.ios_selected == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: release-derivative-notes-${{ inputs.release_id }}
          path: docs/releases/notes/${{ inputs.release_id }}-ios-derivative.md

  publish-github-release-notes:
    needs: aggregate-release-summary
    if: ${{ needs.aggregate-release-summary.result == 'success' }}
    uses: ./.github/workflows/release-github-notes.yml
    with:
      release_id: ${{ inputs.release_id }}
      release_tag: ${{ needs.aggregate-release-summary.outputs.release_tag }}
      release_title: ${{ needs.aggregate-release-summary.outputs.release_title }}
      release_notes_markdown: ${{ needs.aggregate-release-summary.outputs.release_notes_markdown }}
      release_packet_schema: ${{ needs.aggregate-release-summary.outputs.release_packet_schema }}
      reconciliation_ok: ${{ needs.aggregate-release-summary.outputs.reconciliation_ok }}
      fresh_head_closeout_ok: ${{ needs.aggregate-release-summary.outputs.fresh_head_closeout_ok }}
