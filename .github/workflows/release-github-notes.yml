name: Publish GitHub release notes

on:
  workflow_call:
    inputs:
      release_id:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      release_title:
        required: true
        type: string
      release_notes_markdown:
        required: true
        type: string
      release_packet_schema:
        required: true
        type: string
      reconciliation_ok:
        required: true
        type: string
      fresh_head_closeout_ok:
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Verify release publication gates
        shell: bash
        env:
          RELEASE_PACKET_SCHEMA: ${{ inputs.release_packet_schema }}
          RECONCILIATION_OK: ${{ inputs.reconciliation_ok }}
          FRESH_HEAD_CLOSEOUT_OK: ${{ inputs.fresh_head_closeout_ok }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_PACKET_SCHEMA" != "release-execution-packet/v1" ]]; then
            echo "MISSING_RELEASE_PACKET: expected release-execution-packet/v1, got '$RELEASE_PACKET_SCHEMA'" >&2
            exit 1
          fi
          if [[ "$RECONCILIATION_OK" != "true" ]]; then
            echo "STEP_ORDER_VIOLATION: reconciliation gate must pass before GitHub release publication." >&2
            exit 1
          fi
          if [[ "$FRESH_HEAD_CLOSEOUT_OK" != "true" ]]; then
            echo "STALE_HEAD: fresh-head closeout validation must pass before GitHub release publication." >&2
            exit 1
          fi

      - name: Create or update GitHub Release body
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          RELEASE_NOTES_MARKDOWN: ${{ inputs.release_notes_markdown }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes "$RELEASE_NOTES_MARKDOWN"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes "$RELEASE_NOTES_MARKDOWN"
          fi
